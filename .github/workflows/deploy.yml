name: Deploy to GitHub Pages

# main 브랜치에 push될 때마다 Vite 빌드 후 GitHub Pages로 배포.
# ⚠ 최초 1회: repo Settings > Pages > Source 를 "GitHub Actions" 로 바꿔야 함(Chan 수동).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포(진행 중이면 대기, 큐는 덮어쓰지 않음).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
