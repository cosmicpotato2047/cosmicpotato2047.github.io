<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Chan Lee · 경험 수집가</title>
    <meta name="description" content="이찬희(Chan Lee) — 경험 수집가. 작은 행성을 여행하며 남긴 기록." />

    <!-- OG / 공유 -->
    <meta property="og:title" content="Chan Lee · 경험 수집가" />
    <meta property="og:description" content="experience collector — a traveler walking toward planets not yet visited." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.png" />

    <!--
      픽셀 폰트(Galmuri11, 한글 지원) + 본문 폰트(Pretendard).
      초기 세팅은 각 폰트 공식 jsDelivr CDN을 사용. 라이선스 확인 후
      self-host로 교체 권장(SPEC 5장). Galmuri: SIL OFL / Pretendard: SIL OFL.
    -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      제목·UI: Nanum Gothic Coding(단정한 고정폭) — Google Fonts에서 자동 글자 서브셋.
      본문: Pretendard dynamic-subset. 둘 다 비차단(media=print/onload)으로 첫 페인트를 막지 않음.
    -->
    <link rel="stylesheet" media="print" onload="this.media='all'"
          href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&display=swap" />
    <link rel="stylesheet" media="print" onload="this.media='all'"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard-dynamic-subset.css" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&display=swap" />
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard-dynamic-subset.css" />
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
